<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>College Timetable Planner</title>

  <!-- Tailwind + libs -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- External CSS -->
  <link rel="stylesheet" href="Timetable Planner.css" />
  <script src="Timetable Planner.js"></script>
</head>

<body class="p-4 md:p-8">
  <div class="max-w-6xl mx-auto">
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img src="CMRU Logo.png" alt="CMR University Logo" class="w-60 md:w-80">
    </div>

    <header class="mb-8 text-center">
      <h1 class="text-4xl md:text-5xl font-extrabold text-blue-700 mb-2">College Timetable Planner</h1>
      <p class="text-gray-600 text-lg md:text-xl">
        Edit each class's timetable below. Overlapping subjects across classes for the same period will show a warning message.
      </p>
    </header>

    <!-- Conflict message area -->
    <div id="message-container"
      class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded-lg hidden fixed top-4 left-1/2 transform -translate-x-1/2 shadow-lg z-50 w-11/12 max-w-xl"
      role="alert" aria-live="assertive">
      <p id="message-text" class="font-bold"></p>
    </div>

    <!-- Panels side by side -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      
      <!-- Subject Management Panel -->
      <div class="subject-panel">
        <h2>📘 Manage Subjects</h2>
        <div class="flex gap-2 mb-4">
          <input type="text" id="subject-input" placeholder="Enter new subject " />
          <button id="add-subject-btn" class="add-btn">+ Add Subject</button>
        </div>
        <ul id="subject-list" class="subject-list"></ul>  
      </div>

      <!-- Teacher Management Panel -->
      <div class="teacher-panel">
        <h2>👨‍🏫 Manage Teachers</h2>
        
        <label class="block mb-2 font-medium">Choose Subject:</label>
        <select id="subject-picker" class="border rounded px-3 py-2 w-full mb-4">
          <option value="">Select Subject</option>
          <option value="HTML">HTML</option>
          <option value="Java">Java</option>
          <option value="Cloud Computing">Cloud Computing</option>
          <option value="Excel">Excel</option>
          <option value="IDE">IDE</option>
        </select>

        <label class="block mb-2 font-medium">Teacher Name:</label>
        <input type="text" id="teacher-input" class="border rounded px-3 py-2 w-full mb-4" placeholder="Enter teacher name">

        <button id="add-teacher-btn" class="btn-primary">➕ Add Teacher</button>

        <ul id="teacher-list" class="teacher-list"></ul>
      </div>

    </div>

    <!-- Timetables will render here -->
    <div id="timetables-container" class="space-y-8"></div>
  </div>
</body>
</html>
